# Local development compose: builds from source, exposes ports, hot-reloads
# Python via the volume mount.
#
#   docker compose -f docker-compose.dev.yml up --build

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - api_data:/app/data
    environment:
      LEPARVIS_DATABASE_URL: sqlite:////app/data/leparvis.db
      LEPARVIS_CORS_ORIGINS: '["*"]'

  web:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  api_data:
