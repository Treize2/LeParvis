name: ci

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend · lint & smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff httpx

      - name: Lint (ruff)
        run: ruff check app

      - name: Syntax check
        run: python -m compileall -q app

      - name: Smoke test (import + seed + a few endpoints)
        run: |
          python -m app.seed
          python - <<'PY'
          from fastapi.testclient import TestClient
          from app.main import app
          c = TestClient(app)

          assert c.get("/health").status_code == 200
          taxonomy = c.get("/api/meta/taxonomy").json()
          assert "church_types" in taxonomy
          assert any(t["value"] == "monastery" for t in taxonomy["church_types"])

          # Search by church type
          r = c.get("/api/search", params=[("type", "monastery"), ("type", "abbey")])
          assert r.status_code == 200
          assert r.json()["total"] >= 1

          # Search by celebration type
          r = c.get("/api/search", params={"celebration_type": "vespers"})
          assert r.status_code == 200
          assert r.json()["total"] >= 1

          # Geo search around Notre-Dame
          r = c.get("/api/search", params={"latitude": 48.85, "longitude": 2.35, "radius_km": 5})
          assert r.status_code == 200

          # ICS export
          ics = c.get("/api/celebrations/1/ics")
          assert ics.status_code == 200
          assert "BEGIN:VCALENDAR" in ics.text

          print("Smoke test OK.")
          PY

  frontend:
    name: Frontend · syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate JS / HTML
        run: |
          node --check app.js
          # Quick sanity check that the API base placeholder is present.
          grep -q 'id="api-base"' index.html

  docker-build:
    name: Docker · build images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: leparvis/api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: leparvis/web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
