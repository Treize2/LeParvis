name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege token: read-only by default, individual jobs can escalate.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — lint, test, audit, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Unit tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term

      - name: Build (bytecode compile)
        run: python -m compileall -q app

      - name: Production dependency audit (pip-audit)
        run: pip-audit -r requirements.txt --strict

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  web:
    name: Web — lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate JS / HTML
        run: |
          node --check app.js
          grep -q 'id="api-base"' index.html

  secret-scan:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
