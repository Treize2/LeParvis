name: auto-merge to main

on:
  push:
    branches:
      - claude/catholic-mass-schedule-app-u5hhP

permissions:
  contents: write
  actions: write

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOURCE_BRANCH: claude/catholic-mass-schedule-app-u5hhP
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fast-forward main to this branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin main >/dev/null 2>&1; then
            # Normal path: main already exists on the remote.
            git checkout main
            git merge --ff-only "origin/${SOURCE_BRANCH}" || \
              git merge --no-edit "origin/${SOURCE_BRANCH}"
          else
            # Bootstrap: very first run, no main yet — seed it from the
            # claude branch so subsequent merges have something to fast-
            # forward onto.
            echo "ℹ main does not exist on remote yet — bootstrapping from ${SOURCE_BRANCH}"
            git checkout -B main "origin/${SOURCE_BRANCH}"
          fi

          git push origin main

      - name: Trigger deploy
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
