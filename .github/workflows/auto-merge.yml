name: auto-merge to main

on:
  push:
    branches:
      - claude/catholic-mass-schedule-app-u5hhP

permissions:
  contents: write
  actions: write

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fast-forward main to this branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge --ff-only origin/claude/catholic-mass-schedule-app-u5hhP || \
            git merge --no-edit origin/claude/catholic-mass-schedule-app-u5hhP
          git push origin main

      - name: Trigger deploy
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
