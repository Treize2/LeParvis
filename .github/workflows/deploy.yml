name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_API: ${{ github.repository }}/api
  IMAGE_WEB: ${{ github.repository }}/web

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      api_image: ${{ steps.meta_api.outputs.tags }}
      web_image: ${{ steps.meta_web.outputs.tags }}
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute API tags
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_API }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Compute Web tags
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_WEB }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on Scaleway VM
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: https://${{ vars.DOMAIN_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy infra files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "infra/docker-compose.prod.yml,infra/Caddyfile,infra/deploy.sh"
          target: "/opt/leparvis"
          strip_components: 1
          overwrite: true

      - name: Run remote deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: GITHUB_SHA,GHCR_USER,GHCR_TOKEN,DOMAIN_NAME,ACME_EMAIL
          script_stop: true
          script: |
            set -euo pipefail
            export IMAGE_TAG="sha-${GITHUB_SHA}"
            export IMAGE_API="ghcr.io/${{ github.repository }}/api"
            export IMAGE_WEB="ghcr.io/${{ github.repository }}/web"
            cd /opt/leparvis
            chmod +x deploy.sh
            ./deploy.sh
        env:
          GITHUB_SHA: ${{ github.sha }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN || secrets.GITHUB_TOKEN }}
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          ACME_EMAIL: ${{ vars.ACME_EMAIL }}

      - name: Smoke check (public health endpoint)
        if: ${{ vars.DOMAIN_NAME != '' }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS "https://${{ vars.DOMAIN_NAME }}/health"; then
              echo "Health OK"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          exit 1
