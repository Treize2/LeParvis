<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeParvis · Admin</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin">
  <header class="topbar">
    <div class="brand">
      <h1>LeParvis · Admin</h1>
      <span class="tagline">Console de modération des paroisses et célébrations</span>
    </div>
    <div class="api-config">
      <label>API
        <input id="api-base" type="text" placeholder="(vide = même origine)" />
      </label>
      <button type="button" id="btn-logout" class="hidden">Déconnexion</button>
    </div>
  </header>

  <main class="admin-layout">
    <!-- Login screen -->
    <section id="login-view">
      <div class="login-card">
        <h2>Authentification</h2>
        <p class="hint">
          Saisis le jeton défini dans <code>LEPARVIS_ADMIN_TOKEN</code> côté serveur.
        </p>
        <label>
          <span>Token</span>
          <input id="admin-token" type="password" autocomplete="current-password" />
        </label>
        <button type="button" id="btn-login" class="primary">Connexion</button>
        <p id="login-error" class="error hidden"></p>
      </div>
    </section>

    <!-- Logged-in view -->
    <section id="app-view" class="hidden">
      <aside class="admin-sidebar">
        <input id="admin-search" type="text" placeholder="Rechercher un lieu, une ville…" />
        <div id="church-list"></div>
      </aside>

      <section id="church-editor" class="church-editor">
        <p class="placeholder">← Sélectionne un lieu pour le modifier.</p>
      </section>
    </section>
  </main>

  <!-- Merge modal -->
  <div id="merge-modal" class="modal hidden">
    <div class="modal-card">
      <h3>Fusionner avec…</h3>
      <p class="hint">
        Le lieu sélectionné <strong id="merge-source-name"></strong> sera <strong>supprimé</strong>.
        Ses célébrations seront déplacées vers la cible.
      </p>
      <input id="merge-search" type="text" placeholder="Rechercher la cible…" />
      <div id="merge-results"></div>
      <div class="modal-actions">
        <button type="button" id="btn-merge-cancel">Annuler</button>
      </div>
    </div>
  </div>

  <template id="church-row">
    <button type="button" class="church-row">
      <span class="row-name"></span>
      <span class="row-meta"></span>
    </button>
  </template>

  <template id="celebration-row">
    <li class="cel-row">
      <select class="cel-day">
        <option value="">Quotidien</option>
        <option value="0">Lundi</option>
        <option value="1">Mardi</option>
        <option value="2">Mercredi</option>
        <option value="3">Jeudi</option>
        <option value="4">Vendredi</option>
        <option value="5">Samedi</option>
        <option value="6">Dimanche</option>
      </select>
      <input class="cel-time" type="time" />
      <select class="cel-type"></select>
      <select class="cel-rite">
        <option value="ordinary">Forme ordinaire</option>
        <option value="extraordinary">Forme extraordinaire</option>
        <option value="byzantine">Byzantin</option>
        <option value="dominican">Dominicain</option>
      </select>
      <input class="cel-lang" type="text" placeholder="lang" maxlength="3" />
      <button type="button" class="cel-save">💾</button>
      <button type="button" class="cel-delete">🗑</button>
    </li>
  </template>

  <script src="admin.js"></script>
</body>
</html>
