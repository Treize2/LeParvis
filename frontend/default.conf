server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # HTML must never be cached — that's what was causing 'le menu marche pas'
    # after a deploy: the browser kept serving the old index.html which
    # referenced the old app.js IDs.
    location ~* \.html$ {
        add_header Cache-Control "no-store, must-revalidate" always;
        expires off;
    }

    # CSS / JS / images: short cache, immutable when versioned via ?v=N.
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|webp|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=86400" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
